<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麗華の野望 開幕前 戦略アドバイザー</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f8f9fa;
      --color-bg-tertiary: #f1f3f5;
      --color-bg-info: #e7f5ff;
      --color-bg-success: #ebfbee;
      --color-bg-warning: #fff9db;
      --color-bg-danger: #fff5f5;
      --color-text: #212529;
      --color-text-secondary: #868e96;
      --color-text-tertiary: #adb5bd;
      --color-text-info: #1971c2;
      --color-text-success: #2f9e44;
      --color-text-warning: #e67700;
      --color-text-danger: #c92a2a;
      --color-border: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.2);
      --color-border-info: #74c0fc;
      --color-border-success: #8ce99a;
      --color-border-warning: #ffd43b;
      --color-border-danger: #ffa8a8;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1a1b1e;
        --color-bg-secondary: #25262b;
        --color-bg-tertiary: #2c2e33;
        --color-bg-info: #1c3557;
        --color-bg-success: #1b3a2a;
        --color-bg-warning: #3d3000;
        --color-bg-danger: #3d1c1c;
        --color-text: #c1c2c5;
        --color-text-secondary: #909296;
        --color-text-tertiary: #5c5f66;
        --color-text-info: #74c0fc;
        --color-text-success: #8ce99a;
        --color-text-warning: #ffd43b;
        --color-text-danger: #ffa8a8;
        --color-border: rgba(255,255,255,0.1);
        --color-border-secondary: rgba(255,255,255,0.2);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      margin: 0; padding: 1rem;
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
    .header-icon { width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--color-bg-info); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-icon i { font-size: 22px; color: var(--color-text-info); }
    .header h1 { font-size: 20px; font-weight: 600; margin: 0 0 2px; color: var(--color-text); }
    .header p { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
    .card { background: var(--color-bg); border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .section-label { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); margin: 0 0 8px; }
    .sub-label { font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 6px; font-weight: 400; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 1rem; }
    label.field { display: flex; flex-direction: column; gap: 4px; }
    label.field span { font-size: 12px; color: var(--color-text-secondary); }
    select, input[type="number"] {
      width: 100%; font-size: 13px; padding: 6px 8px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--radius-md);
      background: var(--color-bg); color: var(--color-text);
      outline: none;
    }
    select:focus, input:focus { border-color: var(--color-border-info); box-shadow: 0 0 0 2px rgba(116,192,252,0.3); }
    .days-row { display: flex; align-items: center; gap: 8px; }
    .days-row input { width: 80px; text-align: center; }
    .days-row span { font-size: 13px; color: var(--color-text-secondary); }
    .phase-label { font-size: 11px; margin-left: 4px; }
    .advice-box { border-radius: var(--radius-md); padding: 10px 12px; margin-bottom: 1rem; border: 0.5px solid var(--color-border); background: var(--color-bg-secondary); }
    .advice-box .title { font-size: 12px; font-weight: 600; margin: 0 0 3px; }
    .advice-box .body { font-size: 12px; color: var(--color-text-secondary); margin: 0; line-height: 1.6; }
    .inner-card { border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 12px; margin-bottom: 1rem; }
    .diff-box { border-radius: var(--radius-md); padding: 6px 12px; font-size: 12px; font-weight: 600; margin-bottom: 10px; display: none; }
    .sim-box { border-radius: var(--radius-md); padding: 10px 12px; background: var(--color-bg-secondary); border: 0.5px solid var(--color-border); margin-bottom: 10px; display: none; }
    .sim-box .sim-title { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); margin: 0 0 6px; }
    .sim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .sim-card { background: var(--color-bg); border-radius: var(--radius-md); padding: 8px 10px; border: 0.5px solid var(--color-border); }
    .sim-card .sim-sub { font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 2px; }
    .sim-card .sim-val { font-size: 15px; font-weight: 600; color: var(--color-text); margin: 0; }
    .sim-card .sim-detail { font-size: 11px; color: var(--color-text-secondary); margin: 0; }
    .sim-result { font-size: 13px; font-weight: 600; margin: 0; line-height: 1.5; }
    .checkbox-label {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 7px; border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border);
      background: var(--color-bg-secondary);
      cursor: pointer; font-size: 12px; color: var(--color-text);
      user-select: none;
    }
    .checkbox-label.star3 { border-color: var(--color-border-danger); background: var(--color-bg-danger); }
    .checkbox-label.star2 { border-color: var(--color-border-warning); background: var(--color-bg-warning); }
    .checkbox-label input { margin: 0; width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }
    .map-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
    .map-btn {
      padding: 5px 14px; font-size: 13px; border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border); background: var(--color-bg);
      color: var(--color-text); cursor: pointer;
    }
    .map-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .map-btn.active { background: var(--color-bg-info); color: var(--color-text-info); border-color: var(--color-border-info); }
    .analyze-btn {
      width: 100%; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; background: var(--color-bg-info); color: var(--color-text-info);
      border: 0.5px solid var(--color-border-info); border-radius: var(--radius-md);
    }
    .analyze-btn:hover { opacity: 0.85; }
    .result-card { background: var(--color-bg); border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .result-card.danger { background: var(--color-bg-danger); border-color: var(--color-border-danger); }
    .result-card.warning { background: var(--color-bg-warning); border-color: var(--color-border-warning); }
    .result-card.secondary { background: var(--color-bg-secondary); border: none; }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .result-header i { font-size: 18px; }
    .result-header p { font-size: 14px; font-weight: 600; margin: 0; }
    .badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius-md); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 8px; }
    .summary-text { font-size: 16px; font-weight: 600; color: var(--color-text); margin: 0; }
    .item { padding-left: 12px; border-left: 2px solid; margin-bottom: 1rem; }
    .item:last-child { margin-bottom: 0; }
    .item-title { font-size: 13px; font-weight: 600; color: var(--color-text); margin: 0 0 3px; }
    .item-body { font-size: 12px; color: var(--color-text-secondary); margin: 0; line-height: 1.6; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 12px; padding: 3px 8px; border-radius: var(--radius-md); border: 0.5px solid; }
    .tag.star3 { background: var(--color-bg-danger); color: var(--color-text-danger); border-color: var(--color-border-danger); }
    .tag.star2 { background: var(--color-bg-warning); color: var(--color-text-warning); border-color: var(--color-border-warning); }
    .tag.star1 { background: var(--color-bg); color: var(--color-text); border-color: var(--color-border); }
    .text-info { color: var(--color-text-info); }
    .text-danger { color: var(--color-text-danger); }
    .text-warning { color: var(--color-text-warning); }
    .text-success { color: var(--color-text-success); }
    .border-info { border-color: var(--color-border-info) !important; }
    .border-danger { border-color: var(--color-border-danger) !important; }
    .border-warning { border-color: var(--color-border-warning) !important; }
    .border-tertiary { border-color: var(--color-border) !important; }
    @media (max-width: 480px) {
      .grid2 { grid-template-columns: 1fr; }
      .grid3 { grid-template-columns: repeat(2, 1fr); }
      .sim-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon"><i class="ti ti-sword"></i></div>
    <div>
      <h1>麗華の野望 開幕前 戦略アドバイザー</h1>
      <p>野望が始まる前に今日の戦略を立てよう</p>
    </div>
  </div>

  <div class="card">
    <p class="section-label">マップを選択</p>
    <div class="map-btns" id="mapBtns"></div>

    <div class="grid2">
      <label class="field">
        <span>開催形式</span>
        <select id="mode" onchange="onModeChange()">
          <option value="normal">通常版（2週間・21:00〜21:45）</option>
          <option value="national">全国版（1週間・22:00〜22:45）</option>
        </select>
      </label>
      <label class="field">
        <span>今日の残り日数 <span class="phase-label" id="daysPhaseLabel"></span></span>
        <div class="days-row">
          <input type="number" id="daysLeft" min="1" max="14" value="7" oninput="onDaysChange()">
          <span>日</span>
        </div>
      </label>
    </div>

    <div class="advice-box" id="daysAdviceBox">
      <p class="title" id="daysAdviceTitle"></p>
      <p class="body" id="daysAdviceBody"></p>
    </div>

    <div class="inner-card">
      <p class="section-label">勝ちたい相手ギルドの情報</p>
      <div class="grid2">
        <label class="field"><span>自チームの現在ポイント</span><input type="number" id="myPoint" placeholder="例: 48" min="0" oninput="updateSim()"></label>
        <label class="field"><span>相手ギルドの現在ポイント</span><input type="number" id="enemyPoint" placeholder="例: 36" min="0" oninput="updateSim()"></label>
      </div>
      <div class="diff-box" id="pointDiffBox"></div>
      <div class="sim-box" id="simBox">
        <p class="sim-title">フィニッシュ予測シミュレーション</p>
        <div id="simContent"></div>
      </div>
      <label class="field"><span>相手の戦力（戦闘力）</span>
        <select id="enemy">
          <option value="">選択してください</option>
          <option value="weaker">自分たちより弱い</option>
          <option value="equal">ほぼ互角</option>
          <option value="stronger">自分たちより強い</option>
        </select>
      </label>
    </div>

    <label class="field" style="margin-bottom:1rem;">
      <span>布告可能数（前日ランキング）</span>
      <select id="sengenCount">
        <option value="">選択してください</option>
        <option value="three" id="opt3" style="display:none;">3つ（全国版）</option>
        <option value="two" id="opt2">2つ（上位8ギルド）</option>
        <option value="one" id="opt1">1つ（9〜16位）</option>
        <option value="zero">0（布告権なし）</option>
      </select>
    </label>

    <p class="section-label">自チームの保有拠点 <span class="sub-label" id="ownPtLabel"></span></p>
    <div class="grid3" id="baseGrid"></div>

    <p class="section-label">布告されている拠点</p>
    <p class="sub-label">どのギルドからでも、布告されている拠点すべてにチェック</p>
    <div class="grid3" id="attackedGrid"></div>

    <p class="section-label">相手ギルドが保有している拠点 <span class="sub-label" id="enemyPtLabel"></span></p>
    <div class="grid3" id="enemyBaseGrid"></div>

    <button class="analyze-btn" onclick="analyze()">
      <i class="ti ti-sparkles"></i> 今日の戦略を分析する
    </button>
  </div>

  <div id="result"></div>

</div>
<script>
var BASES = {
  '本丸':{star:3,neighbors:['肉屋A','メゾン・ド・イエ','本田のマンション','八本木ヒルズ']},
  '八本木ヒルズ':{star:2,neighbors:['本丸','映画館A','ゲームセンターA']},
  '温泉宿':{star:2,neighbors:['カシワ荘','映画館A','酒場','魚屋A']},
  '本田のマンション':{star:2,neighbors:['本丸','カシワ荘','映画館B','魚屋A']},
  'メゾン・ド・イエ':{star:2,neighbors:['本丸','カジノ']},
  'カジノ':{star:2,neighbors:['メゾン・ド・イエ','本屋','宮本家','映画館B']},
  '肉屋A':{star:1,neighbors:['本丸','ゲームセンターB']},
  '肉屋B':{star:1,neighbors:['魚屋B','魚屋A']},
  '魚屋A':{star:1,neighbors:['肉屋B','温泉宿','本田のマンション']},
  '魚屋B':{star:1,neighbors:['肉屋B','映画館B']},
  'ゲームセンターA':{star:1,neighbors:['橘家','八本木ヒルズ']},
  'ゲームセンターB':{star:1,neighbors:['肉屋A','本屋']},
  '本屋':{star:1,neighbors:['ゲームセンターB','宮本家','カジノ']},
  '宮本家':{star:1,neighbors:['カジノ','本屋']},
  '映画館A':{star:1,neighbors:['八本木ヒルズ','温泉宿']},
  '映画館B':{star:1,neighbors:['カジノ','本田のマンション','魚屋B']},
  'カシワ荘':{star:1,neighbors:['本田のマンション','温泉宿']},
  '酒場':{star:1,neighbors:['温泉宿','橘家']},
  '橘家':{star:1,neighbors:['酒場','ゲームセンターA']}
};
var MAPS = {'トウホク':{available:true},'トウカイ':{available:false},'キンキ':{available:false},'シコク':{available:false},'キュウシュウ':{available:false}};
var currentMap = 'トウホク';
var BASE_NAMES = Object.keys(BASES);

function sl(n){ return '★'.repeat(BASES[n].star); }
function calcPts(list){ return list.reduce(function(s,n){ return s+(BASES[n]?BASES[n].star:0); },0); }
function getChecked(prefix){ return BASE_NAMES.filter(function(n){ var el=document.getElementById(prefix+'_'+n); return el&&el.checked; }); }

function buildMapButtons(){
  var c=document.getElementById('mapBtns'); c.innerHTML='';
  Object.keys(MAPS).forEach(function(name){
    var av=MAPS[name].available;
    var btn=document.createElement('button');
    btn.textContent=name+(av?'':'（未公開）');
    btn.disabled=!av;
    btn.className='map-btn'+(name===currentMap?' active':'');
    if(av){btn.onclick=function(){switchMap(name);};}
    c.appendChild(btn);
  });
}

function switchMap(name){ currentMap=name; buildMapButtons(); buildCheckboxGrids(); document.getElementById('result').innerHTML=''; updateSim(); }

function buildCheckboxGrids(){
  [['baseGrid','own'],['attackedGrid','atk'],['enemyBaseGrid','enm']].forEach(function(g){
    var grid=document.getElementById(g[0]); grid.innerHTML='';
    BASE_NAMES.forEach(function(name){
      var s=BASES[name].star;
      var label=document.createElement('label');
      label.className='checkbox-label'+(s===3?' star3':s===2?' star2':'');
      var cb=document.createElement('input'); cb.type='checkbox'; cb.id=g[1]+'_'+name; cb.onchange=updateSim;
      var span=document.createElement('span'); span.textContent=sl(name)+' '+name;
      label.appendChild(cb); label.appendChild(span); grid.appendChild(label);
    });
  });
}

function onModeChange(){
  var isN=document.getElementById('mode').value==='national';
  document.getElementById('opt3').style.display=isN?'block':'none';
  document.getElementById('opt2').style.display=isN?'none':'block';
  document.getElementById('opt1').textContent=isN?'2つ（全国版：9位以下）':'1つ（9〜16位）';
  document.getElementById('opt2').textContent=isN?'3つ（全国版）':'2つ（上位8ギルド）';
  onDaysChange();
}

function onDaysChange(){
  var days=parseInt(document.getElementById('daysLeft').value)||1;
  var isN=document.getElementById('mode').value==='national';
  var maxDays=isN?7:14; var ratio=days/maxDays;
  var phase,phaseColor,titleText,bodyText;
  if(ratio>0.6){
    phase='序盤';phaseColor='var(--color-text-success)';
    titleText='残り'+days+'日（序盤）— 拠点を広げてポイントの土台を作れ';
    bodyText='序盤は拠点の確保が最優先です。布告権を使って★1・★2拠点を積極的に押さえ、本丸を狙うルートを作ってください。1日あたりの獲得ポイントを増やすことが中盤以降の優位につながります。';
  } else if(ratio>0.3){
    phase='中盤';phaseColor='var(--color-text-warning)';
    titleText='残り'+days+'日（中盤）— ポイント差を計算して攻守を判断せよ';
    bodyText='中盤は相手とのポイント差と1日あたりの獲得ポイントを計算しながら戦略を立てる時期です。前日ランキングで上位をキープし続けることで布告権を多く確保できます。';
  } else {
    phase='終盤';phaseColor='var(--color-text-danger)';
    if(days===1){titleText='最終日 — 布告権を全て使い切り、駆け込み奪取を狙え';bodyText='最終日は布告権を全て使い切ってください。終戦15分前（通常版21:30・全国版22:30）以降に取った拠点は保護時間が終戦を超えるため取り返されません。';}
    else{titleText='残り'+days+'日（終盤）— 逆転するなら今しかない';bodyText='残り'+days+'日の終盤戦です。追いかけている相手には大胆な攻撃、リードしている相手には全力守備で臨んでください。';}
  }
  var label=document.getElementById('daysPhaseLabel'); label.textContent='（'+phase+'）'; label.style.color=phaseColor;
  var box=document.getElementById('daysAdviceBox'); box.style.borderColor=phaseColor.replace('text','border').replace('var(--color-border-','var(--color-border-');
  var titleEl=document.getElementById('daysAdviceTitle'); titleEl.style.color=phaseColor; titleEl.textContent=titleText;
  document.getElementById('daysAdviceBody').textContent=bodyText;
  updateSim();
}

function updateSim(){
  var days=parseInt(document.getElementById('daysLeft').value)||1;
  var myPtRaw=document.getElementById('myPoint').value;
  var enPtRaw=document.getElementById('enemyPoint').value;
  var myPt=myPtRaw!==''?parseInt(myPtRaw):null;
  var enPt=enPtRaw!==''?parseInt(enPtRaw):null;
  var owned=getChecked('own'); var enemyOwned=getChecked('enm');
  var myDailyPts=calcPts(owned,BASES); var enDailyPts=calcPts(enemyOwned,BASES);
  document.getElementById('ownPtLabel').textContent=owned.length>0?'（'+owned.length+'拠点・+'+myDailyPts+'pt/日）':'';
  document.getElementById('enemyPtLabel').textContent=enemyOwned.length>0?'（'+enemyOwned.length+'拠点・+'+enDailyPts+'pt/日）':'';
  var diffBox=document.getElementById('pointDiffBox');
  if(myPt!==null&&enPt!==null){
    var diff=myPt-enPt; diffBox.style.display='block';
    if(diff>0){diffBox.style.cssText='display:block;border-radius:var(--radius-md);padding:6px 12px;font-size:12px;font-weight:600;background:var(--color-bg-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);';diffBox.textContent='現在ポイント差：自チームが +'+diff+'pt リード中';}
    else if(diff<0){diffBox.style.cssText='display:block;border-radius:var(--radius-md);padding:6px 12px;font-size:12px;font-weight:600;background:var(--color-bg-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);';diffBox.textContent='現在ポイント差：相手が '+Math.abs(diff)+'pt リード中';}
    else{diffBox.style.cssText='display:block;border-radius:var(--radius-md);padding:6px 12px;font-size:12px;font-weight:600;background:var(--color-bg-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border);';diffBox.textContent='現在ポイント差：同点';}
  } else { diffBox.style.display='none'; }
  var simBox=document.getElementById('simBox'); var simContent=document.getElementById('simContent');
  if(myPt!==null&&owned.length>0){
    simBox.style.display='block';
    var myFinal=myPt+myDailyPts*days; var enFinal=enPt!==null?enPt+enDailyPts*days:null; var finalDiff=enFinal!==null?myFinal-enFinal:null;
    var html='<div class="sim-grid">';
    html+='<div class="sim-card"><p class="sim-sub">自チーム（'+days+'日後）</p><p class="sim-val">'+myFinal+'pt</p><p class="sim-detail">+'+myDailyPts+'pt/日 × '+days+'日</p></div>';
    if(enFinal!==null){html+='<div class="sim-card"><p class="sim-sub">相手ギルド（'+days+'日後）</p><p class="sim-val">'+enFinal+'pt</p><p class="sim-detail">+'+enDailyPts+'pt/日 × '+days+'日</p></div>';}
    else{html+='<div class="sim-card" style="display:flex;align-items:center;justify-content:center;"><p class="sim-sub">相手ポイントを入力してください</p></div>';}
    html+='</div>';
    if(finalDiff!==null){
      var rc,rt;
      if(finalDiff>0){rc='var(--color-text-success)';rt='現状維持で +'+finalDiff+'pt フィニッシュ — 逃げ切れます';}
      else if(finalDiff<0){var npd=Math.ceil(Math.abs(finalDiff)/days);rc='var(--color-text-danger)';rt='現状維持では '+Math.abs(finalDiff)+'pt 届かない — 1日あたり +'+npd+'pt の追加が必要';}
      else{rc='var(--color-text-warning)';rt='現状維持で同点フィニッシュ — ★1拠点1つでも追加で逆転できます';}
      html+='<p class="sim-result" style="color:'+rc+';">'+rt+'</p>';
    }
    simContent.innerHTML=html;
  } else { simBox.style.display='none'; }
}

function analyze(){
  var mode=document.getElementById('mode').value;
  var sengenCount=document.getElementById('sengenCount').value;
  var enemy=document.getElementById('enemy').value;
  var days=parseInt(document.getElementById('daysLeft').value)||1;
  var myPtRaw=document.getElementById('myPoint').value;
  var enPtRaw=document.getElementById('enemyPoint').value;
  var myPt=myPtRaw!==''?parseInt(myPtRaw):null;
  var enPt=enPtRaw!==''?parseInt(enPtRaw):null;
  if(!sengenCount||!enemy){alert('布告可能数・相手の戦力を選択してください');return;}
  var owned=getChecked('own'); var attacked=getChecked('atk'); var enemyOwned=getChecked('enm');
  var isN=mode==='national'; var maxDays=isN?7:14; var cutoff=isN?'22:30':'21:30'; var endTime=isN?'22:45':'21:45';
  var ratio=days/maxDays; var phase=ratio>0.6?'early':ratio>0.3?'mid':'late';
  var attackable=[];
  owned.forEach(function(n){BASES[n].neighbors.forEach(function(nb){if(owned.indexOf(nb)<0&&attackable.indexOf(nb)<0)attackable.push(nb);});});
  var vulnerable=owned.filter(function(n){return attacked.indexOf(n)>=0;});
  var ownStar2=owned.filter(function(n){return BASES[n].star===2;});
  var ownStar1=owned.filter(function(n){return BASES[n].star===1;});
  var ownHonmaru=owned.indexOf('本丸')>=0;
  var attackableStar2=attackable.filter(function(n){return BASES[n]&&BASES[n].star===2;});
  var attackableStar3=attackable.filter(function(n){return BASES[n]&&BASES[n].star===3;});
  var vulnerableStar2=vulnerable.filter(function(n){return BASES[n].star===2;});
  var myDailyPts=calcPts(owned,BASES); var enDailyPts=calcPts(enemyOwned,BASES);
  var myFinal=myPt!==null?myPt+myDailyPts*days:null; var enFinal=enPt!==null?enPt+enDailyPts*days:null;
  var finalDiff=myFinal!==null&&enFinal!==null?myFinal-enFinal:null;
  var isLeading=finalDiff!==null&&finalDiff>0; var isTrailing=finalDiff!==null&&finalDiff<0;
  var attacks=[],defenses=[],sengenAdvice=[],warnings=[],pointAdvices=[],specialTactics=[];
  if(vulnerable.some(function(n){return BASES[n].star===3;}))warnings.push({title:'本丸が布告されています！',reason:'本丸（★3）は1分あたり30班の防衛が必要です。守り切るか・捨てて他拠点に注力するか判断してください。'});
  if(vulnerableStar2.length>0)warnings.push({title:'★2「'+vulnerableStar2.join('・')+'」が布告されています',reason:'★2拠点は本丸への布告ルートに直結します。守るか・捨てて他に注力するかを判断してください。'});
  if(finalDiff!==null){
    var npd=days>0?Math.ceil(Math.abs(finalDiff)/days):Math.abs(finalDiff);
    if(finalDiff>0)pointAdvices.push({title:'現状維持で +'+finalDiff+'pt フィニッシュ — 守り切れば勝てます',reason:'自チームは+'+myDailyPts+'pt/日、相手は+'+enDailyPts+'pt/日。今の拠点を守り切れば'+days+'日後に勝てます。守備に集中してください。'});
    else if(finalDiff<0)pointAdvices.push({title:'現状維持では '+Math.abs(finalDiff)+'pt 届かない — 1日あたり +'+npd+'pt の追加が必要',reason:'自チームは+'+myDailyPts+'pt/日、相手は+'+enDailyPts+'pt/日。★2（+2pt/日）や★3（+3pt/日）を追加取得して1日あたりのポイントを増やしてください。'});
    else pointAdvices.push({title:'現状維持で同点フィニッシュ — ★1拠点1つでも追加で逆転できます',reason:'自チームは+'+myDailyPts+'pt/日、相手は+'+enDailyPts+'pt/日。★1拠点を1つ追加するだけで'+days+'pt差が生まれます。'});
  } else if(myPt!==null&&owned.length>0){
    pointAdvices.push({title:'自チームは1日あたり +'+myDailyPts+'pt 獲得中',reason:'相手のポイントと拠点情報を入力するとより詳細な予測が出ます。'});
  }
  if(attacked.length>0){
    if(enemy==='weaker'||enemy==='equal')specialTactics.push({title:'布告返しで相手の戦力を分散させる',reason:'相手が布告してきた拠点に布告返しすることで、相手は防衛にもリソースを割かざるを得なくなります。自分たちが有利な場面で活用してください。',type:'attack'});
    if(vulnerable.length>0)specialTactics.push({title:'「'+vulnerable.join('・')+'」の守りを捨てて他拠点に注力する選択肢',reason:'守ることが難しい拠点を捨て、別の拠点の攻略・守備にリソースを集中させる方が得点効率が上がる場合があります。特に追いかけている場合や格上相手に有効です。',type:'special'});
  }
  var summary='',priority='';
  if(phase==='late'||(isTrailing&&days<=3)){
    if(isLeading){
      priority='defense';summary='終盤・勝ちが見えている — 守り切れ。'+cutoff+'以降の奪取は取り返せない';
      defenses.push({title:'全拠点の防衛班を最大限に積む',reason:cutoff+'以降に拠点を取られると保護時間15分が終戦（'+endTime+'）を超えるため取り返せません。守備に全リソースを集中してください。'});
      if(ownHonmaru)defenses.push({title:'本丸の防衛を最優先に',reason:'勝ちが見えている終盤は本丸が最も狙われます。守備班の疲労度に注意してください。'});
      sengenAdvice.push({title:'布告権は布告返しか確実な拠点のみに',reason:'リード中の終盤は守りが最優先です。布告権は布告返しか確実に落とせる拠点のみに使ってください。'});
    } else {
      priority='attack';summary='終盤・追いかけている — '+cutoff+'以降の駆け込み奪取で逆転を狙え';
      var tgts=attackableStar3.length>0?attackableStar3:attackableStar2;
      if(tgts.length>0)attacks.push({title:'「'+tgts.join('・')+'」を'+cutoff+'以降に奪取',reason:cutoff+'以降に取ると保護時間15分が終戦（'+endTime+'）を超えるため相手は取り返せません。1日あたりのポイントも増やせます。'});
      sengenAdvice.push({title:'布告権を全て使い切れ',reason:'終盤の未使用布告権は絶対に使い切ってください。使わずに終わると完全な損失です。'});
    }
  } else if(phase==='mid'){
    priority='balance';summary='中盤 — 1日あたりのポイント差を計算して動け';
    if(attackableStar2.length>0)attacks.push({title:'★2「'+attackableStar2.join('・')+'」を確保する（+2pt/日）',reason:'★2拠点を取ることで1日あたりのポイントが2増えます。本丸への布告ルートも確立できます。'});
    if(attackableStar3.length>0&&(ownStar2.length>0||ownStar1.length>=2))attacks.push({title:'本丸を狙える状況なら布告する（+3pt/日）',reason:'本丸は1日あたり3ptの最高効率拠点です。現在★2：'+ownStar2.length+'個、★1：'+ownStar1.length+'個。'});
    defenses.push({title:'★2拠点と本丸周辺の守備を維持',reason:'★2を失うと1日あたり2ptのロスになります。守備班の疲労度に注意してください。'});
    sengenAdvice.push({title:'布告権は格上相手の★2攻撃か布告返しに使う',reason:'格上相手の拠点を落とすために布告権を使うと効果的です。布告返し時に使えば攻撃力が上がります。'});
  } else {
    priority='attack';summary='序盤 — 早い者勝ちで布告を先手必勝で仕掛けろ';
    attacks.push({title:'8時ぴったりに布告する。布告は早い者勝ち',reason:'布告は朝8時〜夜8時の12時間のみ有効です。序盤は複数のギルドが同じ拠点を狙うため、8時と同時の布告が最大のアドバンテージになります。'});
    if(attackableStar2.length>0)attacks.push({title:'★2「'+attackableStar2.join('・')+'」への布告を優先（+2pt/日）',reason:'★2拠点を確保すると本丸への布告権が得られ、1日あたりのポイントも増えます。'});
    if(sengenCount==='two'||sengenCount==='three')attacks.push({title:'布告権'+(sengenCount==='three'?3:2)+'つを異なる方向の拠点に使う',reason:'複数方向から同時に布告することで相手の防衛を分散させられます。'});
    if(attacked.length>0)specialTactics.push({title:'相手の布告に対して布告返しを仕掛ける',reason:'相手が布告してきた場合、即座に布告返しすることで相手の戦力を分散させられます。',type:'attack'});
  }
  renderResult({summary:summary,priority:priority,attacks:attacks,defenses:defenses,sengenAdvice:sengenAdvice,warnings:warnings,pointAdvices:pointAdvices,specialTactics:specialTactics,attackable:attackable});
}

function renderResult(a){
  var pcMap={
    defense:{label:'守備優先',bg:'var(--color-bg-danger)',tc:'var(--color-text-danger)',icon:'ti-shield',bc:'var(--color-border-danger)'},
    attack:{label:'攻撃優先',bg:'var(--color-bg-info)',tc:'var(--color-text-info)',icon:'ti-sword',bc:'var(--color-border-info)'},
    balance:{label:'バランス',bg:'var(--color-bg-success)',tc:'var(--color-text-success)',icon:'ti-scale',bc:'var(--color-border-success)'}
  };
  var pc=pcMap[a.priority]; var html='';
  if(a.warnings.length>0){
    html+='<div class="result-card danger"><div class="result-header"><i class="ti ti-alert-triangle text-danger"></i><p class="text-danger">緊急警告</p></div>';
    a.warnings.forEach(function(w){html+='<div class="item border-danger"><p class="item-title text-danger">'+w.title+'</p><p class="item-body">'+w.reason+'</p></div>';});
    html+='</div>';
  }
  if(a.pointAdvices.length>0){
    html+='<div class="result-card warning"><div class="result-header"><i class="ti ti-chart-line text-warning"></i><p class="text-warning">ポイント差の分析</p></div>';
    a.pointAdvices.forEach(function(d){html+='<div class="item border-warning"><p class="item-title text-warning">'+d.title+'</p><p class="item-body">'+d.reason+'</p></div>';});
    html+='</div>';
  }
  html+='<div class="result-card"><span class="badge" style="background:'+pc.bg+';color:'+pc.tc+';"><i class="ti '+pc.icon+'"></i> '+pc.label+'</span><p class="summary-text">'+a.summary+'</p></div>';
  function section(items,icon,tc,bc,title){
    if(!items.length)return '';
    var s='<div class="result-card"><div class="result-header"><i class="ti '+icon+'" style="color:'+tc+';"></i><p>'+title+'</p></div>';
    items.forEach(function(item){s+='<div class="item" style="border-color:'+bc+';"><p class="item-title">'+item.title+'</p><p class="item-body">'+item.reason+'</p></div>';});
    return s+'</div>';
  }
  html+=section(a.attacks,'ti-sword','var(--color-text-info)','var(--color-border-info)','攻めるべき行動');
  html+=section(a.defenses,'ti-shield','var(--color-text-danger)','var(--color-border-danger)','守るべき行動');
  html+=section(a.sengenAdvice,'ti-flag','var(--color-text-warning)','var(--color-border-warning)','布告権の使い方');
  if(a.specialTactics.length>0){
    html+='<div class="result-card"><div class="result-header"><i class="ti ti-bulb" style="color:var(--color-text-secondary);"></i><p>特殊戦術の提案</p></div>';
    a.specialTactics.forEach(function(item){var bc=item.type==='attack'?'var(--color-border-info)':'var(--color-border)';html+='<div class="item" style="border-color:'+bc+';"><p class="item-title">'+item.title+'</p><p class="item-body">'+item.reason+'</p></div>';});
    html+='</div>';
  }
  if(a.attackable.length>0){
    html+='<div class="result-card secondary"><p class="section-label">今日布告できる拠点</p><div class="tag-list">';
    a.attackable.forEach(function(n){
      if(!BASES[n])return;
      var s=BASES[n].star;
      html+='<span class="tag star'+(s===3?'3':s===2?'2':'1')+'">'+'★'.repeat(s)+' '+n+'（+'+s+'pt/日）</span>';
    });
    html+='</div></div>';
  }
  document.getElementById('result').innerHTML=html;
}

buildMapButtons(); buildCheckboxGrids(); onDaysChange();
